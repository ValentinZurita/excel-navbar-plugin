name: Quality

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.markdownlint*'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.markdownlint*'

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lockfile sync check
        run: npm run check:lockfile-sync

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=moderate

      - name: TypeScript lint
        run: npm run lint

      - name: Tests with coverage
        run: npm run test:coverage

      - name: Check for import cycles
        run: npm run check:import-cycles

      - name: Architecture and content checks
        run: npm run quality

      - name: Check for unused code and dependencies
        run: npm run check:knip

      - name: Office.js API requirements validation
        run: npm run check:office-api-requirements

      - name: Mock drift detection
        run: npm run check:mock-drift

      - name: Build
        run: npm run build

      - name: Bundle size gate
        run: npm run check:bundle-size

      - name: Generate production manifest
        run: npm run manifest:prod
        env:
          ADDIN_BASE_URL: https://ci.example.com

      - name: Verify manifest exists and is non-empty
        run: |
          if [ ! -s dist/manifest.xml ]; then
            echo "dist/manifest.xml is missing or empty"
            exit 1
          fi

      - name: Validate manifest against Office schema
        run: npm run manifest:validate

      - name: Build bundle analyzer report
        run: npm run analyze:bundle

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-artifacts
          path: |
            coverage/
            dist/bundle-report.html
          retention-days: 7
