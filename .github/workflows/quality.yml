name: Quality

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.markdownlint*'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.markdownlint*'

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=moderate

      - name: TypeScript lint
        run: npm run lint

      - name: Tests
        run: npm run test

      - name: Architecture and content checks
        run: npm run quality

      - name: Build
        run: npm run build

      - name: Generate production manifest
        run: npm run manifest:prod
        env:
          ADDIN_BASE_URL: https://ci.example.com

      - name: Verify manifest exists and is non-empty
        run: |
          if [ ! -s dist/manifest.xml ]; then
            echo "dist/manifest.xml is missing or empty"
            exit 1
          fi

      - name: Report bundle size
        run: |
          echo "Bundle size report:"
          ls -lh dist/*.js dist/*.html 2>/dev/null || true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
